# Cloud Build pipeline: build → push → deploy to Cloud Run.
#
# Triggered by `git push origin main` via the Cloud Build trigger
# `rmgpgab-bubblepop-europe-west1-SummerMaxi-bubblepop--maysd`.
#
# Required substitutions (already configured on the trigger):
#   _AR_HOSTNAME, _AR_PROJECT_ID, _AR_REPOSITORY, _DEPLOY_REGION,
#   _PLATFORM, _SERVICE_NAME, _TRIGGER_ID
#
# Optional substitutions for live Google sign-in to work in the deployed app
# (add these on the trigger if you want real OAuth on Cloud Run; otherwise
# only demo mode functions in production):
#   _NEXT_PUBLIC_FIREBASE_API_KEY
#   _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
#   _NEXT_PUBLIC_FIREBASE_PROJECT_ID
#   _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
#   _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#   _NEXT_PUBLIC_FIREBASE_APP_ID
#   _NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
#
# GEMINI_API_KEY is set as a runtime env var on the Cloud Run service.
# Set it via Cloud Run console or by adding `--set-secrets` to the deploy step
# below (preferred — store the key in Secret Manager, reference here).

steps:
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - -t
      - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}
      - .
      - -f
      - Dockerfile

  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --platform=$_PLATFORM
      - --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --port=8080
      - --allow-unauthenticated
      - --quiet

images:
  - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  # Defaults so a manual `gcloud builds submit` works even without the trigger.
  # Real values come from the trigger's substitution-variable list.
  _AR_HOSTNAME: europe-west1-docker.pkg.dev
  _AR_PROJECT_ID: bubblepop-495106
  _AR_REPOSITORY: cloud-run-source-deploy
  _DEPLOY_REGION: europe-west1
  _PLATFORM: managed
  _SERVICE_NAME: bubblepop
  _NEXT_PUBLIC_FIREBASE_API_KEY: ""
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ""
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ""
  _NEXT_PUBLIC_FIREBASE_APP_ID: ""
  _NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ""

tags:
  - gcp-cloud-build-deploy-cloud-run
  - gcp-cloud-build-deploy-cloud-run-managed
  - bubblepop
